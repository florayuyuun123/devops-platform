<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Learning Platform</title>
<style>
  :root {
    --bg:#0b0e14; --surface:rgba(26, 29, 39, 0.85); --surface2:rgba(34, 38, 58, 0.4);
    --accent:#6366f1; --accent2:#10b981;
    --text:#f8fafc; --muted:#94a3b8; --border:rgba(255, 255, 255, 0.1);
    --danger:#ef4444; --success:#22c55e; --warning:#f59e0b;
    --glass:blur(12px) saturate(180%);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  header{background:rgba(15, 17, 23, 0.8);backdrop-filter:var(--glass);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
  .logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:var(--accent);}
  .logo span{color:var(--accent2);}
  .btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);display:inline-flex;align-items:center;gap:8px;}
  .btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
  .btn-primary{background:linear-gradient(135deg, var(--accent), #4f46e5);color:#fff;box-shadow:0 4px 12px rgba(99, 102, 241, 0.3);}
  .btn-ghost{background:rgba(255, 255, 255, 0.05);color:var(--text);border:1px solid var(--border);}
  .btn-sm{padding:6px 14px;font-size:13px;}
  .btn-success{background:linear-gradient(135deg, var(--accent2), #059669);color:#fff;}
  .btn-danger{background:var(--danger);color:#fff;}

  #login-screen{position:fixed;inset:0;background:var(--bg);background-image:radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0b0e14 100%);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .login-card{background:var(--surface);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:24px;padding:48px;width:100%;max-width:440px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);}
  .login-card h1{font-size:28px;margin-bottom:8px;font-weight:800;letter-spacing:-1px;}
  .login-card p{color:var(--muted);font-size:15px;margin-bottom:32px;}
  .form-group{margin-bottom:20px;}
  .form-group label{display:block;font-size:14px;font-weight:500;color:var(--muted);margin-bottom:8px;}
  .form-group input{width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:16px;transition:border-color 0.2s;}
  .form-group input:focus{outline:none;border-color:var(--accent);background:rgba(0,0,0,0.3);}

  #app-screen{flex:1;display:none;position:relative;}
  .main-layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 64px);}
  .sidebar{background:rgba(15, 17, 23, 0.4);border-right:1px solid var(--border);padding:24px 0;overflow-y:auto;}
  .sidebar-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 20px 12px;}
  .phase-header{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);transition:all .2s;}
  .phase-header:hover{color:var(--text);background:rgba(255,255,255,0.03);}
  .phase-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;transition:all 0.3s;}
  .phase-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent);}
  .lab-item{padding:8px 20px 8px 38px;margin:2px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;color:var(--muted);transition:all .2s;}
  .lab-item:hover{color:var(--text);background:rgba(255,255,255,0.05);}
  .lab-item.selected{background:rgba(99, 102, 241, 0.15);color:var(--accent);font-weight:600;}

  .content{overflow-y:auto;background:#0f1117;}
  .content-inner{max-width:900px;padding:48px 64px;margin:0 auto;}

  .lab-title{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:12px;}
  .lab-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:32px;}
  .badge{padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600;letter-spacing:0.3px;}
  .badge-phase{background:rgba(99, 102, 241, 0.1);color:var(--accent);border:1px solid rgba(99, 102, 241, 0.2);}

  .action-bar{display:flex;gap:16px;align-items:center;margin-bottom:32px;padding:20px;background:var(--surface);backdrop-filter:var(--glass);border-radius:20px;border:1px solid var(--border);}
  .sandbox-status{font-size:14px;font-weight:500;color:var(--muted);margin-left:auto;display:flex;align-items:center;gap:8px;}
  .sandbox-status.running::before{content:'';width:8px;height:8px;background:var(--success);border-radius:50%;box-shadow:0 0 12px var(--success);}

  .lab-content{line-height:1.8;font-size:16px;color:#cbd5e1;}
  .lab-content h1{font-size:28px;margin:40px 0 20px;color:var(--text);font-weight:800;letter-spacing:-0.5px;}
  .lab-content h2{font-size:22px;margin:32px 0 16px;color:var(--text);font-weight:700;border-bottom:1px solid var(--border);padding-bottom:8px;}
  .lab-content h3{font-size:18px;margin:24px 0 12px;color:var(--accent);font-weight:600;}
  .lab-content p{margin-bottom:20px;}
  .lab-content pre{background:#020617;border:1px solid var(--border);border-radius:14px;padding:24px;margin:20px 0;position:relative;}
  .lab-content pre:hover .copy-btn{opacity:1;}
  .lab-content pre code{font-family:'Fira Code','JetBrains Mono',monospace;font-size:14px;color:#e2e8f0;}

  .copy-btn{position:absolute;top:12px;right:12px;padding:6px 12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;opacity:0;transition:all 0.2s;}
  .copy-btn:hover{background:rgba(255,255,255,0.2);color:#fff;}
  .copy-btn.copied{background:var(--success);color:#fff;border-color:var(--success);}

  .terminal-panel{position:fixed;bottom:0;left:0;right:0;height:40vh;background:#020617;border-top:1px solid var(--border);z-index:200;display:none;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,0.5);}
  .terminal-panel.open{display:flex;}
  .terminal-resizer{height:6px;background:transparent;cursor:ns-resize;position:absolute;top:-3px;left:0;right:0;z-index:210;}
  .terminal-resizer:hover{background:var(--accent);transition:0.3s;}
  .terminal-topbar{height:40px;display:flex;align-items:center;padding:0 16px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);}
  .terminal-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .terminal-frame{flex:1;border:none;background:transparent;}

  .welcome-screen{padding:40px 0 16px;}
  .welcome-screen h1{font-size:30px;font-weight:700;margin-bottom:10px;}
  .welcome-screen h1 span{color:var(--accent);}
  .welcome-screen p{color:var(--muted);font-size:15px;margin-bottom:28px;}
  .phase-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
  .phase-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .2s,transform .15s;}
  .phase-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .phase-card-num{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
  .phase-card-title{font-size:14px;font-weight:600;margin-bottom:6px;}
  .phase-card-desc{font-size:12px;color:var(--muted);}

  .loading{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:14px;padding:20px 0;}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media(max-width:700px){
    .main-layout{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .content-inner{padding:20px 16px;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>DevOps Platform</h1>
    <p>Free hands-on DevOps training — no installs required</p>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Your name or student ID" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Choose a password" />
    </div>
    <div id="login-error" class="form-error" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doLogin()">
      Sign in / Register
    </button>
    <p style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted)">
      New student? Just enter any username and password — your account is created automatically.
    </p>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="logo">DevOps<span>Platform</span></div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="user-label" style="font-size:14px;color:var(--muted)"></span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
    </div>
  </header>
  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-label">Curriculum</div>
      <div id="sidebar-labs"></div>
    </div>
    <div class="content">
      <div class="content-inner" id="main-content">
        <div class="loading"><div class="spinner"></div> Loading...</div>
      </div>
    </div>
  </div>
</div>

<div class="terminal-panel" id="terminal-panel">
  <div class="terminal-resizer" id="terminal-resizer"></div>
  <div class="terminal-topbar">
    <div class="terminal-title" id="terminal-title">Terminal</div>
    <button class="terminal-close" onclick="closeTerminal()">×</button>
  </div>
  <iframe class="terminal-frame" id="terminal-frame" src="about:blank"></iframe>
</div>

<script>
const API = 'https://urw-struck-pumps-outline.trycloudflare.com';
let currentUser = null, currentToken = null, allLabs = [], activeSandbox = null;

const PHASES = [
  {id:'phase-1-linux',       title:'Linux fundamentals'},
  {id:'phase-2-networking',  title:'Networking & security'},
  {id:'phase-3-git',         title:'Git & version control'},
  {id:'phase-4-docker',      title:'Docker & containers'},
  {id:'phase-5-cicd',        title:'CI/CD pipelines'},
  {id:'phase-6-ansible',     title:'Ansible automation'},
  {id:'phase-7-kubernetes',  title:'Kubernetes'},
  {id:'phase-8-terraform',   title:'Terraform / IaC'},
  {id:'phase-9-monitoring',  title:'Monitoring & observability'},
  {id:'phase-10-capstone',   title:'Capstone project'},
];

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  if (!user || !pass) { showErr('Please enter username and password.'); return; }
  try {
    const r = await fetch(`${API}/auth/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const d = await r.json();
    currentToken = d.token; currentUser = d.username;
    localStorage.setItem('token', currentToken);
    localStorage.setItem('user', currentUser);
    showApp();
  } catch(e) { showErr('Cannot reach server. You may be offline — try the local node URL.'); }
}

function showErr(m) {
  const el = document.getElementById('login-error');
  el.textContent = m; el.style.display = 'block';
}

function doLogout() {
  localStorage.clear(); currentUser = currentToken = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('user-label').textContent = currentUser;
  await loadLabs();
  showWelcome();
}

async function loadLabs() {
  try {
    const r = await fetch(`${API}/labs`);
    const d = await r.json();
    allLabs = d.labs || [];
  } catch(e) {
    allLabs = PHASES.map((p,i) => ({id:p.id, title:p.title, phase:i+1,
      difficulty:'beginner', duration_minutes:60,
      description:'Start a sandbox to access this lab.'}));
  }
  renderSidebar();
}

function renderSidebar() {
  document.getElementById('sidebar-labs').innerHTML = PHASES.map((ph,i) => {
    const labs = allLabs.filter(l => l.id && l.id.startsWith(ph.id));
    return `<div>
      <div class="phase-header" onclick="showPhase('${ph.id}')">
        <div class="phase-dot"></div>Phase ${i+1}: ${ph.title}
      </div>
      ${labs.map(l => `<div class="lab-item" id="nav-${l.id}"
        onclick="showLab('${l.id}')">${l.title}</div>`).join('')}
    </div>`;
  }).join('');
}

function showWelcome() {
  document.getElementById('main-content').innerHTML = `
    <div class="welcome-screen">
      <h1>Welcome, <span>${currentUser}</span></h1>
      <p>10 phases · 40+ labs · 100% hands-on · works offline</p>
      <div class="phase-cards">
        ${PHASES.map((p,i) => `
          <div class="phase-card" onclick="showPhase('${p.id}')">
            <div class="phase-card-num">Phase ${i+1}</div>
            <div class="phase-card-title">${p.title}</div>
            <div class="phase-card-desc">Click to start</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function showPhase(phaseId) {
  const ph = PHASES.find(p => p.id === phaseId);
  const labs = allLabs.filter(l => l.id && l.id.startsWith(phaseId));
  
  // Custom Phase Intros (The Big Picture)
  const intros = {
    'phase-1-linux': 'Linux is the backbone of the cloud. Every server at Google, Amazon, and Netflix runs on Linux. To be a DevOps Engineer, you must speak the language of the kernel.',
    'phase-6-ansible': 'Stop configuring servers one by one. Ansible allows you to define your entire infrastructure as code, ensuring 1000 servers are as easy to manage as one.',
  };

  document.getElementById('main-content').innerHTML = `
    <div style="padding:40px 0">
      <div class="badge badge-phase" style="margin-bottom:16px">Phase ${PHASES.indexOf(ph)+1} Overview</div>
      <h1 class="lab-title" style="margin-bottom:24px">${ph.title}</h1>
      
      <div class="lab-content" style="background:var(--surface2); border:1px solid var(--border); padding:32px; border-radius:24px; margin-bottom:48px; backdrop-filter:var(--glass);">
        <h3 style="margin-top:0; color:var(--accent2)">The Big Picture</h3>
        <p style="font-size:18px; line-height:1.6; color:var(--text)">${intros[phaseId] || 'Master the core concepts of this phase to build your DevOps foundation.'}</p>
      </div>

      <h2 style="font-size:20px; font-weight:700; margin-bottom:24px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Available Labs</h2>
      <div class="phase-cards">
      ${labs.map(l => `
        <div class="phase-card" onclick="showLab('${l.id}')">
          <div class="phase-card-title" style="font-size:16px">${l.title}</div>
          <div class="phase-card-desc" style="margin-top:8px">${l.description||'Deep dive into this topic.'}</div>
          <div style="margin-top:16px;display:flex;gap:8px">
            <span class="badge badge-time">${l.duration_minutes||60} min</span>
            <span class="badge badge-level">${l.difficulty||'beginner'}</span>
          </div>
        </div>`).join('') || '<p style="color:var(--muted)">Labs coming soon.</p>'}
      </div>
    </div>`;
}

async function showLab(labId) {
  document.querySelectorAll('.lab-item').forEach(e => e.classList.remove('selected'));
  const nav = document.getElementById(`nav-${labId}`);
  if (nav) nav.classList.add('selected');
  document.getElementById('main-content').innerHTML =
    '<div class="loading"><div class="spinner"></div> Loading lab...</div>';
  try {
    const r = await fetch(`${API}/labs/${labId}`);
    const lab = await r.json();
    renderLab(lab);
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      '<div style="padding:32px 0;color:var(--muted)">Start a sandbox to read this lab offline.</div>';
  }
}

function renderLab(lab) {
  const running = activeSandbox && activeSandbox.lab_id === lab.id;
  document.getElementById('main-content').innerHTML = `
    <div class="lab-title">${lab.title}</div>
    <div class="lab-meta">
      <span class="badge badge-phase">Phase ${lab.phase}</span>
      <span class="badge badge-time">${lab.duration_minutes} min</span>
      <span class="badge badge-level">${lab.difficulty}</span>
    </div>
    <div class="action-bar">
      <button class="btn btn-success btn-sm" onclick="startSandbox('${lab.id}')">
        ${running ? 'Open terminal' : 'Start sandbox'}
      </button>
      ${running ? `<button class="btn btn-danger btn-sm"
        onclick="stopSandbox('${activeSandbox.container}')">Stop</button>` : ''}
      <span class="sandbox-status ${running?'running':''}" id="sandbox-status">
        ${running ? 'Sandbox running' : 'No active sandbox'}
      </span>
    </div>
    <div class="lab-content">${md(lab.content || lab.description || '')}</div>`;
}

function md(t) {
  if (!t) return '';
  return t
    .replace(/```[\w]*\n([\s\S]*?)```/g, (m, c) => {
      const code = c.trim();
      return `<pre><code>${c}</code><button class="copy-btn" onclick="copyCode(this, \`${btoa(code)}\`)">Copy</button></pre>`;
    })
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<)/gm,'<p>');
}

function copyCode(btn, base64) {
  const code = atob(base64);
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Resizable terminal logic
let isResizing = false;
const resizer = document.getElementById('terminal-resizer');
const panel = document.getElementById('terminal-panel');

resizer.addEventListener('mousedown', e => {
  isResizing = true;
  document.body.style.cursor = 'ns-resize';
});

window.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const height = window.innerHeight - e.clientY;
  if (height > 100 && height < window.innerHeight * 0.8) {
    panel.style.height = height + 'px';
    document.querySelector('.content').style.paddingBottom = height + 'px';
  }
});

window.addEventListener('mouseup', () => {
  isResizing = false;
  document.body.style.cursor = 'default';
});

async function startSandbox(labId) {
  document.getElementById('sandbox-status').textContent = 'Starting sandbox...';
  try {
    const r = await fetch(`${API}/sandbox/start`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({student_id: currentUser, lab_id: labId})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Failed to start sandbox');
    activeSandbox = {...d, lab_id: labId};
    openTerminal(API + d.terminal_path, labId);
    document.getElementById('sandbox-status').textContent = 'Sandbox running';
    document.getElementById('sandbox-status').className = 'sandbox-status running';
  } catch(e) {
    document.getElementById('sandbox-status').textContent = 'Failed to start sandbox';
    console.error('Sandbox error:', e);
  }
}

async function stopSandbox(name) {
  await fetch(`${API}/sandbox/${name}`, {method:'DELETE'});
  activeSandbox = null;
  document.getElementById('sandbox-status').textContent = 'Stopped';
  document.getElementById('sandbox-status').className = 'sandbox-status';
}

function openTerminal(url, labId) {
  document.getElementById('terminal-title').textContent = `Terminal — ${labId}`;
  document.getElementById('terminal-frame').src = url;
  document.getElementById('terminal-panel').classList.add('open');
  const height = parseInt(panel.style.height) || 400;
  panel.style.height = height + 'px';
  document.querySelector('.content').style.paddingBottom = height + 'px';
}

function closeTerminal() {
  document.getElementById('terminal-panel').classList.remove('open');
  document.querySelector('.content').style.paddingBottom = '0';
}

window.addEventListener('load', () => {
  const t = localStorage.getItem('token'), u = localStorage.getItem('user');
  if (t && u) { currentToken = t; currentUser = u; showApp(); }
  document.getElementById('login-pass')
    .addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
});
</script>
</body>
</html>
