<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Learning Platform</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  :root {
    --bg:#0b0e14; --surface:rgba(26, 29, 39, 0.85); --surface2:rgba(34, 38, 58, 0.4);
    --accent:#6366f1; --accent2:#10b981;
    --text:#f8fafc; --muted:#94a3b8; --border:rgba(255, 255, 255, 0.1);
    --danger:#ef4444; --success:#22c55e; --warning:#f59e0b;
    --glass:blur(12px) saturate(180%);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  header{background:rgba(15, 17, 23, 0.8);backdrop-filter:var(--glass);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
  .logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:var(--accent);display:flex;align-items:center;gap:12px;}
  .logo img{height:32px;width:32px;object-fit:contain;filter:drop-shadow(0 0 8px var(--accent));}
  .logo span{color:var(--accent2);margin-left:-8px;}
  .mobile-menu-btn { display: none; cursor: pointer; font-size: 24px; padding: 0 16px; margin-left:-8px; }
  .btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);display:inline-flex;align-items:center;gap:8px;}
  .btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
  .btn-primary{background:linear-gradient(135deg, var(--accent), #4f46e5);color:#fff;box-shadow:0 4px 12px rgba(99, 102, 241, 0.3);}
  .btn-ghost{background:rgba(255, 255, 255, 0.05);color:var(--text);border:1px solid var(--border);}
  .btn-sm{padding:6px 14px;font-size:13px;}
  .btn-success{background:linear-gradient(135deg, var(--accent2), #059669);color:#fff;}
  .btn-danger{background:var(--danger);color:#fff;}

  #login-screen{position:fixed;inset:0;background:var(--bg);background-image:radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0b0e14 100%);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .login-card{background:var(--surface);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:24px;padding:48px;width:100%;max-width:440px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);}
  .login-card h1{font-size:28px;margin-bottom:8px;font-weight:800;letter-spacing:-1px;}
  .login-card p{color:var(--muted);font-size:15px;margin-bottom:32px;}
  .form-group{margin-bottom:20px;}
  .form-group label{display:block;font-size:14px;font-weight:500;color:var(--muted);margin-bottom:8px;}
  .form-group input{width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:16px;transition:border-color 0.2s;}
  .form-group input:focus{outline:none;border-color:var(--accent);background:rgba(0,0,0,0.3);}

  #app-screen{flex:1;display:none;position:relative;height:100vh;flex-direction:column;}
  .main-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 64px);}
  .sidebar{width:280px;min-width:280px;background:rgba(15, 17, 23, 0.4);border-right:1px solid var(--border);padding:24px 0;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
  .sidebar-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:12px;}


  
  .phase-group{margin:0 12px 4px;border-radius:12px;overflow:hidden;border:1px solid transparent;transition:all 0.2s;}
  .phase-group:hover{background:rgba(255,255,255,0.02);}
  .phase-group.active{background:rgba(255,255,255,0.03);border-color:var(--border);}
  .phase-header{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:12px;user-select:none;transition:0.2s;}
  .phase-header:hover{background:rgba(255,255,255,0.05);}
  .phase-num{font-size:10px;font-weight:700;color:var(--muted);background:var(--surface2);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--border);}
  .phase-group.active .phase-num{background:var(--accent);color:#fff;border-color:var(--accent);}
  .phase-title{font-size:13px;font-weight:600;color:var(--text);flex:1;}
  .phase-arrow{font-size:10px;color:var(--muted);transition:transform 0.3s;opacity:0.5;}
  .phase-group.active .phase-arrow{transform:rotate(90deg);opacity:1;}

  .lab-list{padding:4px 0 10px;display:none;background:rgba(0,0,0,0.1);}
  .phase-group.active .lab-list{display:block;}
  .lab-item{padding:8px 14px 8px 48px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .2s;display:flex;align-items:center;gap:8px;position:relative;}
  .lab-item::before{content:'';position:absolute;left:24px;top:50%;width:6px;height:6px;border-radius:50%;background:var(--border);transform:translateY(-50%);}
  .lab-item:hover{color:var(--text);background:rgba(255,255,255,0.03);}
  .lab-item.selected{color:var(--accent);font-weight:600;background:rgba(99, 102, 241, 0.05);}
  .lab-item.selected::before{background:var(--accent);box-shadow:0 0 8px var(--accent);}

  .lab-pane{flex:1;min-width:300px;overflow-y:auto;background:#0f1117;border-right:1px solid var(--border);position:relative;}
  .content-inner{max-width:900px;padding:48px 40px;margin:0 auto;}

  /* Standard Vertical Layout (Side by Side Terminal) */
  .terminal-pane{flex:1;min-width:300px;background:#020617;display:none;flex-direction:column;position:relative;}
  .terminal-pane.open{display:flex;}
  
  .horizontal-resizer{width:6px;background:transparent;cursor:col-resize;z-index:200;transition:0.2s;}
  .horizontal-resizer:hover{background:var(--accent);}

  /* Headers / Banners inside panes */
  .pane-header{height:44px;background:rgba(255,255,255,0.05);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:var(--glass);}
  .pane-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:8px;}

  .lab-title{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:12px;}
  .lab-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
  .badge{padding:4px 12px;border-radius:8px;font-size:11px;font-weight:600;}
  .badge-phase{background:rgba(99, 102, 241, 0.1);color:var(--accent);border:1px solid rgba(99, 102, 241, 0.2);}

  .action-bar{display:flex;gap:12px;align-items:center;margin-bottom:32px;padding:12px 16px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid var(--border);}
  .sandbox-status{font-size:13px;font-weight:500;color:var(--muted);margin-left:auto;display:flex;align-items:center;gap:8px;}
  .sandbox-status.running::before{content:'';width:8px;height:8px;background:var(--success);border-radius:50%;box-shadow:0 0 10px var(--success);}

  .lab-content{line-height:1.7;font-size:15px;color:#cbd5e1;}
  .lab-content h1{font-size:24px;margin:32px 0 16px;color:var(--text);font-weight:800;letter-spacing:-0.5px;}
  .lab-content h2{font-size:19px;margin:24px 0 12px;color:var(--text);font-weight:700;border-bottom:1px solid var(--border);padding-bottom:8px;}
  .lab-content h3{font-size:16px;margin:18px 0 10px;color:var(--accent);font-weight:600;}
  .lab-content p{margin-bottom:16px;}
  .lab-content pre{background:#020617;border:1px solid var(--border);border-radius:12px;padding:20px;margin:16px 0;position:relative;overflow-x:auto;}
  .lab-content pre:hover .copy-btn{opacity:1;}
  .lab-content pre code{font-family:'JetBrains Mono','Fira Code',monospace;font-size:13px;color:#e2e8f0;line-height:1.5;}

  /* GitHub Alerts */
  .markdown-alert { padding: 12px 16px; margin: 16px 0; border-radius: 8px; border-left: 4px solid var(--border); background: rgba(255,255,255,0.03); }
  .markdown-alert-title { font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .markdown-alert-note { border-left-color: var(--accent); background: rgba(99, 102, 241, 0.05); }
  .markdown-alert-note .markdown-alert-title { color: var(--accent); }
  .markdown-alert-tip { border-left-color: var(--success); background: rgba(34, 197, 94, 0.05); }
  .markdown-alert-tip .markdown-alert-title { color: var(--success); }
  .markdown-alert-important { border-left-color: var(--accent); background: rgba(99, 102, 241, 0.08); }
  .markdown-alert-important .markdown-alert-title { color: var(--accent); }
  .markdown-alert-warning { border-left-color: var(--warning); background: rgba(245, 158, 11, 0.05); }
  .markdown-alert-warning .markdown-alert-title { color: var(--warning); }

  .copy-btn{position:absolute;top:10px;right:10px;padding:5px 10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;opacity:0;transition:0.2s;}
  .copy-btn:hover{background:var(--accent);color:#fff;}

  .terminal-tabs{display:flex;align-items:flex-end;gap:4px;height:100%;overflow-x:auto;scrollbar-width:none;}
  .terminal-tab{height:34px;padding:0 12px;background:rgba(15,17,23,0.3);border:1px solid var(--border);border-bottom:none;border-radius:6px 6px 0 0;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;margin-bottom:-1px;}
  .terminal-tab:hover{color:var(--text);}
  .terminal-tab.active{background:rgba(2, 6, 23, 0.9);color:var(--accent);border-color:var(--border);font-weight:600;z-index:10;box-shadow:0 -4px 12px rgba(99, 102, 241, 0.15);}
  .tab-close{font-size:12px;opacity:0.5;width:14px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:3px;}
  .tab-close:hover{background:var(--danger);color:#fff;opacity:1;}
  .tab-plus{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);border-radius:5px;cursor:pointer;color:var(--muted);margin-bottom:4px;}
  .tab-plus:hover{background:var(--accent);color:#fff;}

  .terminal-body{flex:1;display:flex;background:rgba(2, 6, 23, 0.7);backdrop-filter:blur(18px);position:relative;border-top:1px solid var(--border);}
  .terminal-frame-wrapper{position:absolute;inset:0;width:100%;height:100%;display:none;}
  .terminal-frame-wrapper.active{display:flex;flex-direction:column;}
  .terminal-frame{flex:1;width:100%;height:100%;border:none;}
  .terminal-loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(2,6,23,0.85);backdrop-filter:blur(8px);z-index:10;}
  .terminal-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}

  /* Modern PowerShell Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); border: 2px solid transparent; background-clip: content-box; }

  .pipeline-container{margin-top:32px;display:flex;align-items:center;justify-content:space-between;position:relative;padding:0 20px;}
  .pipeline-line{position:absolute;top:15px;left:40px;right:40px;height:2px;background:var(--border);z-index:1;}
  .pipeline-node{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .pipeline-circle{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);transition:all 0.3s;}
  .pipeline-circle.success{background:var(--success);border-color:var(--success);color:#fff;box-shadow:0 0 15px rgba(34, 197, 94, 0.4);}
  .pipeline-circle.active{background:var(--surface);border-color:var(--accent);color:var(--accent);animation:pulse-node 1.5s infinite;}
  .pipeline-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
  .pipeline-node.active .pipeline-label{color:var(--accent);}
  .pipeline-node.success .pipeline-label{color:var(--success);}

  @keyframes pulse-node{ 0%{box-shadow:0 0 0 0 rgba(99, 102, 241, 0.4);} 70%{box-shadow:0 0 0 10px rgba(99, 102, 241, 0);} 100%{box-shadow:0 0 0 0 rgba(99, 102, 241, 0);} }
  .timer-box{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:18px;font-weight:700;color:var(--text);background:var(--surface2);padding:6px 12px;border-radius:8px;border:1px solid var(--border);}
  .timer-box.warning{color:var(--danger);animation:pulse-timer 1s infinite;}
  @keyframes pulse-timer{ 0%{opacity:1;} 50%{opacity:0.5;} 100%{opacity:1;} }

  .welcome-screen{padding:20px 0;}
  .welcome-screen h1{font-size:28px;font-weight:800;margin-bottom:8px;}
  .welcome-screen h1 span{color:var(--accent);}
  .welcome-screen p{color:var(--muted);font-size:14px;margin-bottom:24px;}
  .phase-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;}
  .phase-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;cursor:pointer;transition:all .2s;}
  .phase-card:hover{border-color:var(--accent);background:rgba(99, 102, 241, 0.05);transform:translateY(-2px);}
  .phase-card-num{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
  .phase-card-title{font-size:15px;font-weight:700;margin-bottom:8px;}
  .phase-card-desc{font-size:12px;color:var(--muted);line-height:1.5;}

  .welcome-screen{padding:40px 0 16px;}
  .welcome-screen h1{font-size:30px;font-weight:700;margin-bottom:10px;}
  .welcome-screen h1 span{color:var(--accent);}
  .welcome-screen p{color:var(--muted);font-size:15px;margin-bottom:28px;}
  .phase-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
  .phase-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .2s,transform .15s;}
  .phase-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .phase-card-num{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
  .phase-card-title{font-size:14px;font-weight:600;margin-bottom:6px;}
  .phase-card-desc{font-size:12px;color:var(--muted);}

  .loading{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:14px;padding:20px 0;}
  .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media(max-width:700px){
    .mobile-menu-btn{display:block;}
    .main-layout{grid-template-columns:1fr;}
    .sidebar{display:flex !important; position:fixed; left:0; top:64px; bottom:0; z-index:1000; background:var(--bg); border-right:1px solid var(--border); transform:translateX(-100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
    .sidebar.open{transform:translateX(0);}
    .content-inner{padding:20px 16px;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>DevOps Platform</h1>
    <p>Free hands-on DevOps training — no installs required</p>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Your name or student ID" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Choose a password" />
    </div>
    <div id="login-error" class="form-error" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doLogin()">
      Sign in / Register
    </button>
    <p style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted)">
      New student? Just enter any username and password — your account is created automatically.
    </p>
  </div>
</div>

<div id="app-screen">
  <header>
    <div style="display:flex;align-items:center;">
      <div class="mobile-menu-btn" onclick="toggleSidebar()">☰</div>
      <div class="logo">
        <img src="logo.png" alt="Logo">
        DevOps<span>Platform</span> 
        <small style="font-size:10px;opacity:0.3;margin-left:8px;">v3.0</small>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:20px">
      <span id="user-label" style="font-size:14px;color:var(--muted)"></span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
    </div>
  </header>
  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-label">Curriculum</div>
      <div id="sidebar-labs"></div>
    </div>
    
    <div class="lab-pane">
      <div class="pane-header">
        <div class="pane-title">Instructions</div>
      </div>
      <div class="content-inner" id="main-content">
        <div class="loading"><div class="spinner"></div> Loading...</div>
      </div>
    </div>

    <div class="horizontal-resizer" id="pane-resizer"></div>

    <div class="terminal-pane" id="terminal-pane">
      <div class="pane-header">
        <div class="terminal-tabs" id="terminal-tabs"></div>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="tab-plus" onclick="addTab()">+</div>
          <button class="terminal-close" onclick="closeTerminal()">×</button>
        </div>
      </div>
      <div class="terminal-body" id="terminal-body"></div>
    </div>
  </div>
</div>

<script>
const isOffline = window.location.hostname === 'localhost' || /^[0-9.]+$/.test(window.location.hostname);
const API = isOffline ? window.location.origin + '/api' : 'https://flip-organ-zero-citizenship.trycloudflare.com';
let currentUser = null, currentToken = null, allLabs = [], activeSandbox = null, activeLab = null;

const PHASES = [
  {id:'phase-1-linux',       title:'Linux fundamentals'},
  {id:'phase-2-networking',  title:'Networking & security'},
  {id:'phase-3-git',         title:'Git & version control'},
  {id:'phase-4-docker',      title:'Docker & containers'},
  {id:'phase-5-cicd',        title:'CI/CD pipelines'},
  {id:'phase-6-ansible',     title:'Ansible automation'},
  {id:'phase-7-kubernetes',  title:'Kubernetes'},
  {id:'phase-8-terraform',   title:'Terraform / IaC'},
  {id:'phase-9-monitoring',  title:'Monitoring & observability'},
  {id:'phase-10-capstone',   title:'Capstone project'},
];

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  if (!user || !pass) { showErr('Please enter username and password.'); return; }
  try {
    const r = await fetch(`${API}/auth/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const d = await r.json();
    currentToken = d.token; currentUser = d.username;
    localStorage.setItem('token', currentToken);
    localStorage.setItem('user', currentUser);
    showApp();
  } catch(e) { showErr('Cannot reach server. You may be offline — try the local node URL.'); }
}

function showErr(m) {
  const el = document.getElementById('login-error');
  el.textContent = m; el.style.display = 'block';
}

function doLogout() {
  localStorage.clear(); currentUser = currentToken = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('user-label').textContent = currentUser;
  await loadLabs();
  showWelcome();
}

async function loadLabs() {
  try {
    const r = await fetch(`${API}/labs`);
    const d = await r.json();
    allLabs = d.labs || [];
  } catch(e) {
    allLabs = PHASES.map((p,i) => ({id:p.id, title:p.title, phase:i+1,
      difficulty:'beginner', duration_minutes:60,
      description:'Start a sandbox to access this lab.'}));
  }
  renderSidebar();
}

function renderSidebar() {
  document.getElementById('sidebar-labs').innerHTML = PHASES.map((ph,i) => {
    const labs = allLabs.filter(l => l.id && l.id.startsWith(ph.id));
    const isActive = activePhaseId === ph.id;
    return `
    <div class="phase-group ${isActive ? 'active' : ''}" id="phase-${ph.id}">
      <div class="phase-header" onclick="togglePhase('${ph.id}')">
        <div class="phase-num">${i+1}</div>
        <div class="phase-title">${ph.title}</div>
        <div class="phase-arrow">▶</div>
      </div>
      <div class="lab-list">
        ${labs.map(l => {
          const progress = JSON.parse(localStorage.getItem('progress_' + l.id) || '{}');
          const isDone = Object.values(progress).every(v => v === true) && Object.keys(progress).length > 0;
          return `<div class="lab-item ${selectedLabId === l.id ? 'selected' : ''}" id="nav-${l.id}"
            onclick="showLab('${l.id}')">
            ${l.title} ${isDone ? '<span style="color:var(--success);margin-left:auto;">✓</span>' : ''}
          </div>`;
        }).join('')}
        ${labs.length === 0 ? '<div style="padding:10px 48px;font-size:12px;color:var(--muted)">Labs coming soon</div>' : ''}
      </div>
    </div>`;
  }).join('');
}

let activePhaseId = 'phase-1-linux';
let selectedLabId = null;
function togglePhase(id) {
  activePhaseId = (activePhaseId === id) ? null : id;
  renderSidebar();
  if (activePhaseId) showPhase(id);
}

async function showLab(id) {
  const lab = allLabs.find(l => l.id === id);
  if (!lab) return;
  activeLab = lab;
  
  document.getElementById('main-content').innerHTML = '<div class="loading"><div class="spinner"></div> Loading lab...</div>';
  
  // 1. Instant Deep Sync (Ensure Stop button visibility accurately)
  await syncActiveSandbox(id);

  // 2. Fetch full lab details
  try {
    const r = await fetch(`${API}/labs/${id}`);
    const lab = await r.json();
    activeLab = lab;
    selectedLabId = id;
    renderLab(lab);
  } catch(e) {
    document.getElementById('main-content').innerHTML = '<div style="padding:32px 0;color:var(--muted)">Start a sandbox to read this lab offline.</div>';
  }
}

async function syncActiveSandbox(targetLabId) {
  try {
    const r = await fetch(`${API}/sandbox/active`);
    const d = await r.json();
    // Find a sandbox that matches this lab ID (either exactly or as part of the container name)
    const match = d.sandboxes.find(s => s.lab_id === targetLabId || s.name.includes(targetLabId.replace(/-/g, '_')));
    
    if (match) {
      activeSandbox = { 
        container: match.name, 
        lab_id: targetLabId, // Lock it to the current lab for UI consistency
        started: match.started,
        duration: match.duration || 60,
        terminal_path: match.terminal_path || `/terminal/${match.name}`
      };
    } else {
      activeSandbox = null;
    }
  } catch(e) { activeSandbox = null; }
}

// Background poller to keep everything synchronized
setInterval(() => {
  if (currentUser) syncActiveSandbox(selectedLabId).then(() => {
    if (activeLab) renderLab(activeLab); // Soft refresh UI if needed
  });
}, 5000);

function showWelcome() {

    <div class="welcome-screen">
      <h1>Welcome, <span>${currentUser}</span></h1>
      <p>10 phases · 40+ labs · 100% hands-on · works offline</p>
      <div class="phase-cards">
        ${PHASES.map((p,i) => `
          <div class="phase-card" onclick="showPhase('${p.id}')">

}

  // Custom Phase Intros (The Big Picture)

      <div class="lab-content" style="background:var(--surface2); border:1px solid var(--border); padding:32px; border-radius:24px; margin-bottom:48px; backdrop-filter:var(--glass);">
        <h3 style="margin-top:0; color:var(--accent2)">The Big Picture</h3>
        <p style="font-size:18px; line-height:1.6; color:var(--text)">${intros[phaseId] || 'Master the core concepts of this phase to build your DevOps foundation.'}</p>
      </div>

      <h2 style="font-size:20px; font-weight:700; margin-bottom:24px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Available Labs</h2>
      <div class="phase-cards">
      ${labs.map(l => `
        <div class="phase-card" onclick="showLab('${l.id}')">
          <div class="phase-card-title" style="font-size:16px">${l.title}</div>
          <div class="phase-card-desc" style="margin-top:8px">${l.description||'Deep dive into this topic.'}</div>
          <div style="margin-top:16px;display:flex;gap:8px">
            <span class="badge badge-time">${l.duration_minutes||60} min</span>
            <span class="badge badge-level">${l.difficulty||'beginner'}</span>
          </div>
        </div>`).join('') || '<p style="color:var(--muted)">Labs coming soon.</p>'}
      </div>

}

function renderLab(lab) {
  const phId = PHASES.find(p => lab.id.startsWith(p.id))?.id;
  activePhaseId = phId;
  selectedLabId = lab.id;
  renderSidebar();

  const running = activeSandbox && activeSandbox.lab_id === lab.id;
  document.getElementById('main-content').innerHTML = `
    <div class="lab-title">${lab.title}</div>
    <div class="lab-meta">
      <span class="badge badge-phase">Phase ${lab.phase}</span>
      <span class="badge badge-time">${lab.duration_minutes} min</span>
      <span class="badge badge-level">${lab.difficulty}</span>
    </div>
     <div class="action-bar">
       <button class="btn btn-success btn-sm" onclick="startSandbox('${lab.id}')">
         ${running ? 'Open terminal' : '▶ Start lab'}
       </button>
       ${running && lab.preview_port ? `<button class="btn btn-primary btn-sm" style="background:var(--accent2)"
         onclick="openPreview('${activeSandbox.container}', ${lab.preview_port})">🌐 Preview App</button>` : ''}
       ${running ? `<button class="btn btn-danger btn-sm"
         onclick="stopSandbox('${activeSandbox.container}')">■ Stop lab</button>` : ''}
       <div class="sandbox-status ${running?'running':''}" id="sandbox-status">
         ${running ? '● Lab running' : 'No active lab'}
       </div>
       ${running ? `<div class="timer-box" id="lab-timer" style="margin-left:auto;">00:00</div>` : ''}
     </div>
     <div class="lab-content">${md(lab.content || lab.description || '')}</div>
     <div style="display:flex; align-items:center; gap:16px; margin-top:32px;">
       <h3 style="margin:0; font-size:16px; text-transform:uppercase; color:var(--muted); letter-spacing:1px;">Progress Validation</h3>
       ${running ? `<button class="btn btn-sm" style="background:var(--surface2); border:1px solid var(--border); padding:4px 12px; font-size:12px;" onclick="pollProgress('${lab.id}')">↻ Run Check</button>` : ''}
     </div>
     <div id="pipeline-ui"></div>`;
     if (running) startTimer(activeSandbox.started, activeSandbox.duration || lab.duration_minutes || 60);
     pollProgress(lab.id);
}

let currentTimerContainer = null;
let timerInterval = null;

function startTimer(startedAt, durationMinutes) {
  if (timerInterval) clearInterval(timerInterval);
  const timerEl = document.getElementById('lab-timer');
  if (!timerEl) return;

  function update() {
    const now = Math.floor(Date.now() / 1000);
    const elapsed = now - startedAt;
    const totalSeconds = durationMinutes * 60;
    const timeLeft = Math.max(0, totalSeconds - elapsed);
    
    if (timeLeft <= 0) {
      timerEl.textContent = "00:00";
      timerEl.style.color = "var(--danger)";
      timerEl.classList.add('pulse-red');
      clearInterval(timerInterval);
      return;
    }

    const min = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    timerEl.textContent = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    
    if (timeLeft < 300) timerEl.classList.add('pulse-red');
  }

  update();
  timerInterval = setInterval(update, 1000);
}

async function pollProgress(labId) {
  if (!activeSandbox) { document.getElementById('pipeline-ui').innerHTML = ''; return; }
  try {
    const r = await fetch(`${API}/sandbox/${activeSandbox.container}/check`);
    if (!r.ok) return; // Silent guard for 404/500
    const data = await r.json();
    if (data && data.stages) renderPipeline(data.stages);
  } catch(e) { console.error('Poll error:', e); }
}

function renderPipeline(stages) {
  const container = document.getElementById('pipeline-ui');
  if (!container || !stages || !Array.isArray(stages)) return;
  container.innerHTML = `
    <div class="pipeline-container">
      <div class="pipeline-line"></div>
      ${stages.map((s,i) => `
        <div class="pipeline-node ${s.status === 'success' ? 'success' : s.status === 'running' ? 'active' : ''}">
          <div class="pipeline-circle ${s.status === 'success' ? 'success' : s.status === 'running' ? 'active' : ''}">${i+1}</div>
          <div class="pipeline-label">${s.name}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function md(t) {
  if (!t) return '';
  
  // Total Title Suppression: Strip any leading # header regardless of whitespace, line endings, or characters.
  t = t.replace(/^[\s\ufeff\xa0]*# .+(\r?\n)*/, '').trim();

  const stash = [];
  // 1. Protect code blocks
  let out = t.replace(/```[\w]*\n([\s\S]*?)```/g, (m, c) => {
    const i = stash.length;
    stash.push(c);
    return `%%CODE_BLOCK_${i}%%`;
  });

  // 2. Process Alerts: > [!NOTE] (Handle optional whitespace and multi-line content)
  const alerts = { 'NOTE': 'note', 'TIP': 'tip', 'IMPORTANT': 'important', 'WARNING': 'warning', 'CAUTION': 'warning' };
  out = out.replace(/^> \[!(\w+)\]\r?\n([\s\S]+?)(?=\r?\n\r?\n|\r?\n>|\r?\n#|$)/gm, (m, type, content) => {
    const key = type.toUpperCase();
    const cls = alerts[key] || 'note';
    return `<div class="markdown-alert markdown-alert-${cls}"><div class="markdown-alert-title">${key}</div>${content.replace(/^> ?/gm, '').trim()}</div>`;
  });

  // 3. Process basic markdown
  out = out
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<(div|h|li|pre))/gm,'<p>');

  // 4. Restore code blocks
  out = out.replace(/%%CODE_BLOCK_(\d+)%%/g, (m, i) => {
    const code = stash[i];
    return `<pre><code>${code}</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></pre>`;
  });
  
  return out;
}

function copyCode(btn) {
  const code = btn.previousElementSibling.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => {
      showCopied(btn);
    });
  } else {
    // Fallback for non-secure context
    const ta = document.createElement("textarea");
    ta.value = code; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy");
    document.body.removeChild(ta);
    showCopied(btn);
  }
}

function showCopied(btn) {
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = 'Copy';
    btn.classList.remove('copied');
  }, 2000);
}

// Resizable terminal logic (Horizontal)
let isResizing = false;
const resizH = document.getElementById('pane-resizer');
const paneL = document.querySelector('.lab-pane');
const paneT = document.getElementById('terminal-pane');

resizH.addEventListener('mousedown', e => {
  isResizing = true;
  document.body.style.cursor = 'col-resize';
});

window.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const rect = document.querySelector('.main-layout').getBoundingClientRect();
  const sidebarW = 260;
  const x = e.clientX - rect.left - sidebarW;
  if (x > 300 && x < rect.width - 300) {
    paneL.style.flex = 'none';
    paneL.style.width = x + 'px';
  }
});

window.addEventListener('mouseup', () => {
  isResizing = false;
  document.body.style.cursor = 'default';
});

let terminalTabs = [];
let activeTabId = null;

async function startSandbox(labId) {
  document.getElementById('sandbox-status').textContent = 'Starting lab...';
  try {
    const r = await fetch(`${API}/sandbox`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        lab_id: labId, 
        student_id: currentUser,
        duration_minutes: activeLab.duration_minutes || 60
      })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || `Server error: ${r.status}`);
    
    activeSandbox = d;
    addTab(API + d.terminal_path, labId);
    renderLab(activeLab);
    
    document.getElementById('sandbox-status').textContent = '● Lab running';
    document.getElementById('sandbox-status').className = 'sandbox-status running';
  } catch(e) {
    document.getElementById('sandbox-status').textContent = 'Failed to start lab';
    console.error('Sandbox error:', e);
  }
}

function openPreview(container, port) {
  const url = `${API}/view/${container}/${port}/`;
  window.open(url, '_blank');
}

async function stopSandbox(name, force = false) {
  if (!force && !confirm('This will destroy your sandbox container. Are you sure?')) return;
  try {
    const r = await fetch(`${API}/sandbox/${name}`, { method: 'DELETE' });
    if (r.ok) {
      activeSandbox = null;
      terminalTabs = [];
      document.getElementById('terminal-body').innerHTML = '';
      closeTerminal();
      if (activeLab) renderLab(activeLab);
    }
  } catch (e) { console.error('Stop error:', e); }
}

function addTab(url, title) {
  if (!activeSandbox) return;
  const path = activeSandbox.terminal_path || `/terminal/${activeSandbox.container}`;
  const targetUrl = url || (API + path);
  const targetTitle = title || activeSandbox.lab_id;
  const id = 'tab-' + Date.now();
  
  const tab = { id, title: targetTitle, url: targetUrl };
  terminalTabs.push(tab);
  
  renderTabs();

  // Wrapper with loading spinner
  const wrapper = document.createElement('div');
  wrapper.className = 'terminal-frame-wrapper';
  wrapper.id = 'wrapper-' + id;
  wrapper.innerHTML = `
    <div class="terminal-loader" id="loader-${id}">
      <div class="terminal-spinner"></div>
      <div style="color:var(--muted);font-size:13px;margin-top:16px">Launching lab terminal...</div>
    </div>`;
  
  const ifr = document.createElement('iframe');
  ifr.className = 'terminal-frame';
  ifr.id = 'frame-' + id;
  ifr.src = targetUrl;
  ifr.addEventListener('load', () => {
    const loader = document.getElementById('loader-' + id);
    if (loader) loader.remove();
  });
  wrapper.appendChild(ifr);
  document.getElementById('terminal-body').appendChild(wrapper);
  
  switchTab(id);
  document.getElementById('terminal-pane').classList.add('open');
}

function renderTabs() {
  const container = document.getElementById('terminal-tabs');
  container.innerHTML = terminalTabs.map((t, i) => `
    <div class="terminal-tab ${t.id === activeTabId ? 'active' : ''}" onclick="switchTab('${t.id}')">
      <span>${t.title} #${i+1}</span>
      <div class="tab-close" onclick="event.stopPropagation(); removeTab('${t.id}')">×</div>
    </div>
  `).join('');
}

function switchTab(id) {
  activeTabId = id;
  renderTabs();
  document.querySelectorAll('.terminal-frame-wrapper').forEach(f => {
    f.classList.toggle('active', f.id === 'wrapper-' + id);
  });
}

function removeTab(id) {
  terminalTabs = terminalTabs.filter(t => t.id !== id);
  const ifr = document.getElementById('frame-' + id);
  if (ifr) ifr.remove();
  
  if (terminalTabs.length === 0) {
    closeTerminal();
  } else if (activeTabId === id) {
    switchTab(terminalTabs[terminalTabs.length - 1].id);
  } else {
    renderTabs();
  }
}

function closeTerminal() {
  document.getElementById('terminal-pane').classList.remove('open');
}

window.addEventListener('load', () => {
  const t = localStorage.getItem('token'), u = localStorage.getItem('user');
  if (t && u) { currentToken = t; currentUser = u; showApp(); }
  document.getElementById('login-pass')
    .addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
});
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
}
